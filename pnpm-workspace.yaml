packages:
  - "packages/*"

# Required for pnpm 10+: explicitly allow native module build scripts to run.
# Without this, pnpm install skips postinstall scripts for native bindings,
# causing runtime failures in better-sqlite3, esbuild, etc.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - onnxruntime-node
  - protobufjs
  - sharp
