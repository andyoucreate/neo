name: feature
description: "Plan, implement, and review a feature"
steps:
  plan:
    agent: architect
    sandbox: readonly
  implement:
    agent: developer
    dependsOn: [plan]
    prompt: |
      Implement the following based on the architecture plan.

      Original request: {{prompt}}
  review:
    agent: reviewer-quality
    dependsOn: [implement]
    sandbox: readonly
  fix:
    agent: fixer
    dependsOn: [review]
    condition: "output(review).hasIssues == true"
